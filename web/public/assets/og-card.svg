<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Codex — 面向软件工程的 AI 编程智能体">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1024"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="100" y="100" width="900" height="500" rx="240" fill="url(#glow)"/>

  <!-- Codex blossom mark (left side) -->
  <g transform="translate(180, 315)">
    <g transform="rotate(-15)">
      <ellipse cx="0" cy="-105" rx="42" ry="78" fill="url(#petal)" opacity="0.95"/>
      <ellipse cx="0" cy="-105" rx="42" ry="78" fill="url(#petal)" opacity="0.95" transform="rotate(72)"/>
      <ellipse cx="0" cy="-105" rx="42" ry="78" fill="url(#petal)" opacity="0.95" transform="rotate(144)"/>
      <ellipse cx="0" cy="-105" rx="42" ry="78" fill="url(#petal)" opacity="0.95" transform="rotate(216)"/>
      <ellipse cx="0" cy="-105" rx="42" ry="78" fill="url(#petal)" opacity="0.95" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="32" fill="#FFFFFF"/>
      <circle cx="0" cy="0" r="20" fill="#0A0A0F"/>
    </g>
  </g>

  <!-- Title + subtitle -->
  <g font-family="-apple-system, 'Source Serif Pro', system-ui, sans-serif">
    <text x="430" y="290" font-size="120" font-weight="700" fill="url(#titleGrad)" letter-spacing="-2">Codex</text>
    <text x="430" y="360" font-size="36" font-weight="500" fill="#E9D5FF">面向软件工程的 AI 编程智能体</text>
    <text x="430" y="430" font-size="22" font-weight="400" fill="#9CA3AF" opacity="0.9">
      <tspan x="430" dy="0">同一款强大的编程智能体，现已入驻 ChatGPT</tspan>
      <tspan x="430" dy="32">功能开发 · 复杂重构 · 代码迁移</tspan>
    </text>

    <!-- Brand footer -->
    <text x="430" y="560" font-size="20" font-weight="600" fill="#FFFFFF" letter-spacing="3">
      OPENAI / CODEX
    </text>
    <text x="650" y="560" font-size="18" font-weight="400" fill="#9CA3AF">
      ✦ ChatGPT 下的 Codex
    </text>
  </g>
</svg>
