<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Codex blossom: 5-petal flower shape, OpenAI brand-adjacent -->
  <defs>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0A0A0F"/>
  <!-- 5 petals around the center, rotated -->
  <g transform="translate(16,16)">
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="url(#petal)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFFFFF"/>
  </g>
</svg>
